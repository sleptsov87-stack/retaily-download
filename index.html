<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --blue:    #1565C0;
    --blue2:   #1976D2;
    --blue3:   #42A5F5;
    --teal:    #00ACC1;
    --bg:      #EEF2F8;
    --white:   #FFFFFF;
    --text:    #1A237E;
    --muted:   #546E7A;
    --border:  #C5D5E8;
    --shadow:  rgba(21,101,192,0.14);
  }

  html, body { height: 100%; }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100dvh;
    padding: 24px 16px 40px;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(circle at 15% 20%, rgba(21,101,192,0.1) 0%, transparent 50%),
      radial-gradient(circle at 85% 80%, rgba(0,172,193,0.08) 0%, transparent 50%);
    pointer-events: none; z-index: 0;
  }

  .wrap {
    position: relative; z-index: 1;
    width: 100%; max-width: 380px;
    display: flex; flex-direction: column; align-items: center; gap: 14px;
  }

  .card {
    background: var(--white);
    border-radius: 24px;
    padding: 28px 24px 24px;
    width: 100%;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06), 0 16px 48px var(--shadow);
    animation: rise 0.5s cubic-bezier(0.22,1,0.36,1) both;
  }

  @keyframes rise {
    from { opacity:0; transform: translateY(20px); }
    to   { opacity:1; transform: translateY(0); }
  }

  /* Шапка */
  .header {
    display: flex; align-items: center; gap: 14px;
    margin-bottom: 22px; padding-bottom: 18px;
    border-bottom: 1px solid var(--border);
  }

  .app-icon {
    width: 64px; height: 64px;
    border-radius: 16px; overflow: hidden; flex-shrink: 0;
    box-shadow: 0 4px 14px var(--shadow);
    background: var(--blue);
  }
  .app-icon img { width:100%; height:100%; object-fit:cover; display:block; }

  .app-name {
    font-size: 20px; font-weight: 800;
    color: var(--text); letter-spacing: -0.3px; line-height: 1.2;
    margin-bottom: 2px;
  }
  .app-tag { font-size: 12px; color: var(--muted); font-weight: 500; line-height: 1.5; }
  .badge {
    display: inline-flex; align-items: center; gap: 4px;
    background: #E3F2FD; color: var(--blue);
    font-size: 10.5px; font-weight: 700;
    padding: 3px 8px; border-radius: 99px; margin-top: 5px;
    letter-spacing: 0.2px;
  }

  /* Авто-редирект */
  .auto-block {
    display: none; align-items: center; gap: 10px;
    background: #F1F8E9; border: 1px solid #AED581;
    border-radius: 12px; padding: 12px 14px;
    margin-bottom: 18px;
    font-size: 13px; font-weight: 600; color: #33691E;
  }
  .auto-block.show { display: flex; }

  .auto-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #7CB342; flex-shrink: 0;
    animation: blink 1s infinite;
  }
  @keyframes blink {
    0%,100% { opacity:1; transform:scale(1); }
    50%      { opacity:.4; transform:scale(1.4); }
  }

  .auto-inner { flex:1; }

  .progress-bar {
    height: 3px; background: #DCEDC8;
    border-radius: 99px; margin-top: 7px; overflow: hidden;
  }
  .progress-fill {
    height: 100%; background: #8BC34A;
    border-radius: 99px; width: 0%;
    transition: width 2.8s linear;
  }

  /* Кнопки */
  .section-label {
    font-size: 10.5px; font-weight: 700; color: var(--muted);
    letter-spacing: 0.9px; text-transform: uppercase;
    margin-bottom: 10px;
  }

  .buttons { display: flex; flex-direction: column; gap: 9px; }

  .btn {
    display: flex; align-items: center; gap: 12px;
    padding: 13px 14px;
    border-radius: 14px;
    border: 1.5px solid var(--border);
    background: var(--white);
    color: var(--text);
    text-decoration: none;
    font-family: 'Inter', sans-serif;
    font-size: 14px; font-weight: 600;
    transition: all 0.16s ease;
    cursor: pointer;
  }
  .btn:hover {
    border-color: var(--blue2); background: #F0F7FF;
    transform: translateY(-1px);
    box-shadow: 0 4px 14px var(--shadow);
  }
  .btn:active { transform: scale(0.98); box-shadow: none; }

  .btn.primary {
    background: linear-gradient(135deg, var(--blue), var(--blue2));
    border-color: transparent; color: #fff;
    box-shadow: 0 6px 20px rgba(21,101,192,0.3);
  }
  .btn.primary:hover {
    background: linear-gradient(135deg, #1976D2, #1E88E5);
    box-shadow: 0 8px 28px rgba(21,101,192,0.4);
  }

  .btn-ico {
    width: 30px; height: 30px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .btn.primary .btn-ico { background: rgba(255,255,255,0.15); }
  .btn:not(.primary) .btn-ico { background: #EEF2F8; }

  .btn-body { flex:1; text-align:left; }
  .btn-sub { display:block; font-size:10px; font-weight:500; opacity:.6; margin-bottom:1px; }

  .btn-arr {
    opacity: .35; flex-shrink: 0;
  }
  .btn.primary .btn-arr { opacity: .6; }

  .sep {
    display:flex; align-items:center; gap:10px;
    color: var(--muted); font-size:11px; font-weight:500; margin: 2px 0;
  }
  .sep::before, .sep::after { content:''; flex:1; height:1px; background:var(--border); }

  /* Нижняя карточка */
  .meta-card {
    background: var(--white);
    border-radius: 16px; padding: 13px 18px;
    width: 100%;
    display: flex; align-items: center; gap: 10px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    animation: rise 0.5s 0.08s cubic-bezier(0.22,1,0.36,1) both;
  }
  .meta-icon { width:30px; height:30px; border-radius:8px; overflow:hidden; flex-shrink:0; background:var(--blue); }
  .meta-icon img { width:100%; height:100%; object-fit:cover; display:block; }
  .meta-text { flex:1; }
  .meta-text strong { display:block; font-size:12px; color:var(--text); }
  .meta-text span   { font-size:11px; color:var(--muted); }
  .meta-stars { color:#FFA000; font-size:13px; letter-spacing:1px; }
</style>
</head>
